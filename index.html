<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5~N1 코어 어휘 학습</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--text:#f1f5f9;--sub:#94a3b8;--orange:#f59e0b;--border:#475569;--header-bg:linear-gradient(135deg,#312e81,#4338ca)}
[data-theme="light"]{--bg:#f1f5f9;--card:#ffffff;--card2:#e2e8f0;--text:#0f172a;--sub:#475569;--border:#cbd5e1;--header-bg:linear-gradient(135deg,#6366f1,#818cf8)}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .3s,color .3s}
header{width:100%;padding:16px 20px;text-align:center;background:var(--header-bg);border-bottom:2px solid var(--accent);position:relative}
header h1{font-size:1.5rem;font-weight:700;color:#fff}
header p{color:#c7d2fe;font-size:0.8rem;margin-top:3px}
.theme-toggle{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:6px 10px;border-radius:8px}
.container{max-width:520px;width:100%;padding:14px;flex:1}
.level-tabs{display:flex;gap:4px;margin-bottom:10px}
.level-tabs button{flex:1;padding:8px 0;border:2px solid transparent;border-radius:8px;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all .2s;background:var(--card);color:var(--sub)}
.level-tabs button.active{color:#fff}
.level-tabs button[data-lv="n5"].active{background:#16a34a;border-color:#16a34a}
.level-tabs button[data-lv="n4"].active{background:#2563eb;border-color:#2563eb}
.level-tabs button[data-lv="n3"].active{background:#d97706;border-color:#d97706}
.level-tabs button[data-lv="n2"].active{background:#7c3aed;border-color:#7c3aed}
.level-tabs button[data-lv="n1"].active{background:#dc2626;border-color:#dc2626}
nav{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
nav button{padding:7px 12px;border:none;border-radius:8px;background:var(--card);color:var(--sub);font-size:0.78rem;cursor:pointer;transition:all .2s}
nav button.active{background:var(--accent);color:#fff}
.stats-bar{display:flex;gap:6px;margin-bottom:10px}
.stat{flex:1;background:var(--card);border-radius:10px;padding:8px;text-align:center}
.stat .num{font-size:1.2rem;font-weight:700}
.stat .label{font-size:0.65rem;color:var(--sub);margin-top:2px}
.progress-bar{width:100%;height:4px;background:var(--card2);border-radius:2px;margin-bottom:12px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s}
.card{background:var(--card);border-radius:16px;padding:24px 20px;text-align:center;min-height:260px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;cursor:pointer;user-select:none;transition:all .3s}
.card:hover{box-shadow:0 8px 30px rgba(99,102,241,0.12)}
.card .kanji{font-size:2.8rem;font-weight:700;margin-bottom:6px}
.card .reading{font-size:1.05rem;color:var(--accent2);margin-bottom:4px}
.card .cat-badge{font-size:0.7rem;padding:2px 8px;border-radius:12px;background:var(--card2);color:var(--sub);margin-bottom:8px}
.card .meaning{font-size:1rem;color:var(--sub);margin-bottom:8px;opacity:0;transition:opacity .3s}
.card .example{font-size:0.82rem;color:var(--sub);opacity:0;transition:opacity .3s;line-height:1.5;max-width:360px}
.card .meaning.show,.card .example.show{opacity:1}
.card .tag{position:absolute;top:10px;right:12px;font-size:0.62rem;padding:2px 7px;border-radius:20px;background:var(--card2);color:var(--sub)}
.card .ptag{position:absolute;top:10px;left:12px;font-size:0.62rem;padding:2px 7px;border-radius:20px}
.ptag.new{background:#312e81;color:var(--accent2)}
.ptag.learning{background:#422006;color:var(--orange)}
.ptag.mastered{background:#052e16;color:var(--green)}
[data-theme="light"] .ptag.new{background:#e0e7ff;color:#4338ca}
[data-theme="light"] .ptag.learning{background:#fef3c7;color:#92400e}
[data-theme="light"] .ptag.mastered{background:#dcfce7;color:#166534}
.card-actions{display:flex;gap:6px;margin-top:10px;width:100%}
.card-actions button{flex:1;padding:10px;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-hard{background:rgba(239,68,68,0.15);color:var(--red)}
.btn-good{background:rgba(99,102,241,0.15);color:var(--accent2)}
.btn-easy{background:rgba(34,197,94,0.15);color:var(--green)}
.card-btns{display:flex;gap:6px;margin-top:8px}
.card-btns button{background:var(--card2);border:none;color:var(--sub);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:0.78rem;transition:all .2s}
.card-btns button:hover{color:var(--accent2)}
.card-btns button.bookmarked{color:var(--orange)}
.hint{text-align:center;color:var(--sub);font-size:0.72rem;margin:8px 0}
.search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:0.85rem;margin-bottom:10px;outline:none}
.search:focus{border-color:var(--accent)}
.cat-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.cat-filter button{padding:4px 9px;border:1px solid var(--border);border-radius:16px;background:transparent;color:var(--sub);font-size:0.7rem;cursor:pointer;transition:all .2s}
.cat-filter button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.word-list{display:flex;flex-direction:column;gap:5px}
.word-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--card);border-radius:8px;cursor:pointer;transition:background .2s;gap:8px}
.word-item:hover{background:var(--card2)}
.wi-left{display:flex;align-items:center;gap:10px;min-width:0}
.wi-left .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.new{background:var(--accent2)}.dot.learning{background:var(--orange)}.dot.mastered{background:var(--green)}
.wi-left .wk{font-size:1rem;font-weight:600;white-space:nowrap}
.wi-left .wr{font-size:0.75rem;color:var(--accent2);white-space:nowrap}
.wi-right{display:flex;align-items:center;gap:8px}
.wi-right .wm{font-size:0.75rem;color:var(--sub);text-align:right}
.wi-right .bm{cursor:pointer;font-size:0.85rem;color:var(--sub)}
.wi-right .bm.on{color:var(--orange)}
.quiz-option{width:100%;padding:12px;background:var(--card);border:2px solid transparent;border-radius:10px;color:var(--text);font-size:0.85rem;cursor:pointer;text-align:left;margin-bottom:6px;transition:all .2s}
.quiz-option:hover{border-color:var(--accent);background:var(--card2)}
.quiz-option.correct{border-color:var(--green);background:rgba(34,197,94,0.1)}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,0.1)}
.quiz-q{font-size:2rem;font-weight:700;text-align:center;margin:24px 0 16px}
.quiz-sub{text-align:center;color:var(--sub);font-size:0.82rem;margin-bottom:16px}
.quiz-score{text-align:center;margin:30px 0}
.quiz-score .big{font-size:2.8rem;font-weight:700;color:var(--accent2)}
.quiz-score p{color:var(--sub);margin-top:6px}
.btn-main{display:block;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:12px}
.btn-sec{display:block;width:100%;padding:12px;background:var(--card);color:var(--sub);border:none;border-radius:10px;font-size:0.9rem;cursor:pointer;margin-top:8px}
.chart-wrap{background:var(--card);border-radius:12px;padding:16px;margin-bottom:14px}
.chart-wrap h3{font-size:0.85rem;margin-bottom:10px;color:var(--sub)}
canvas{width:100%;height:160px;display:block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:10px;padding:14px;text-align:center}
.stat-card .sv{font-size:1.5rem;font-weight:700}
.stat-card .sl{font-size:0.7rem;color:var(--sub);margin-top:3px}
.empty{text-align:center;padding:30px;color:var(--sub)}
@media(max-width:400px){.card .kanji{font-size:2.2rem}nav button{font-size:0.72rem;padding:5px 8px}.level-tabs button{font-size:0.7rem;padding:6px 0}}
</style>
</head>

let bookmarks=JSON.parse(localStorage.getItem("jlpt_bm")||"{}");
let progress=JSON.parse(localStorage.getItem("jlpt_prog")||"{}");
let wrongList=JSON.parse(localStorage.getItem("jlpt_wrong")||"[]");
let dailyStats=JSON.parse(localStorage.getItem("jlpt_daily")||"{}");

const app=document.getElementById("app");
document.documentElement.setAttribute("data-theme",theme);

function save(){
  localStorage.setItem("jlpt_prog",JSON.stringify(progress));
  localStorage.setItem("jlpt_bm",JSON.stringify(bookmarks));
  localStorage.setItem("jlpt_wrong",JSON.stringify(wrongList));
  localStorage.setItem("jlpt_daily",JSON.stringify(dailyStats));
}
function today(){return new Date().toISOString().slice(0,10)}
function addDaily(n){const d=today();dailyStats[d]=(dailyStats[d]||0)+n;save()}
function vid(lv,i){return lv+"_"+i}
function getVocab(){return DATA[currentLv]||[]}
function allVocab(){let r=[];for(let lv in DATA) DATA[lv].forEach((v,i)=>r.push({...v,lv,vid:vid(lv,i)}));return r}
function getLv(id){return progress[id]||0}
function getLvName(id){const l=getLv(id);return l===0?"new":l<3?"learning":"mastered"}
function getLvLabel(id){return{new:"NEW",learning:"학습중",mastered:"완료"}[getLvName(id)]}
function isBm(id){return!!bookmarks[id]}
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function speak(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ja-JP";u.rate=0.85;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function buildQueue(){
  let pool=getVocab().map((v,i)=>({...v,vid:vid(currentLv,i),idx:i}));
  if(filterCat!=="all") pool=pool.filter(v=>v.cat===filterCat);
  if(currentTab==="review"){
    pool=pool.filter(v=>wrongList.includes(v.vid));
  }else if(currentTab==="bookmark"){
    pool=pool.filter(v=>isBm(v.vid));
  }
  const nw=pool.filter(v=>getLv(v.vid)===0);
  const lr=pool.filter(v=>{const l=getLv(v.vid);return l>0&&l<3});
  const ms=pool.filter(v=>getLv(v.vid)>=3);
  studyQueue=[...shuffle(nw),...shuffle(lr),...shuffle(ms)];
  cardIdx=0;revealed=false;
}

function stats(){
  const v=getVocab();let n=0,l=0,m=0;
  v.forEach((_,i)=>{const lv=getLv(vid(currentLv,i));if(lv===0)n++;else if(lv<3)l++;else m++});
  return{n,l,m,t:v.length}
}

window.toggleTheme=function(){
  theme=theme==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",theme);
  localStorage.setItem("jlpt_theme",theme);
};
window.setLv=function(lv){currentLv=lv;filterCat="all";buildQueue();quizData=null;render()};
window.setTab=function(t){currentTab=t;buildQueue();quizData=null;render()};
window.setCat=function(c){filterCat=c;buildQueue();render()};
window.revealCard=function(){if(!revealed){revealed=true;render()}};
window.rateCard=function(id,r){
  let lv=getLv(id);
  if(r==="hard")lv=Math.max(0,lv-1);else if(r==="good")lv=Math.min(5,lv+1);else lv=Math.min(5,lv+2);
  progress[id]=lv;addDaily(1);cardIdx++;revealed=false;render();
};
window.toggleBm=function(id,e){if(e)e.stopPropagation();bookmarks[id]=!bookmarks[id];if(!bookmarks[id])delete bookmarks[id];save();render()};
window.speakWord=function(t,e){if(e)e.stopPropagation();speak(t)};
window.doSearch=function(v){searchQ=v;render()};
window.jumpToCard=function(id){
  const parts=id.split("_");currentLv=parts[0];currentTab="flash";
  buildQueue();const idx=studyQueue.findIndex(w=>w.vid===id);
  if(idx>=0)cardIdx=idx;revealed=false;render();
};

window.startQuiz=function(mode){
  let pool;
  if(mode==="wrong"){
    pool=[];wrongList.forEach(wid=>{
      const[lv,idx]=wid.split("_");
      if(DATA[lv]&&DATA[lv][+idx])pool.push({...DATA[lv][+idx],vid:wid,lv});
    });
  }else{
    pool=getVocab().map((v,i)=>({...v,vid:vid(currentLv,i),lv:currentLv}));
  }
  if(pool.length<4){alert("단어가 4개 이상 필요합니다.");return}
  const all=allVocab();
  const selected=shuffle(pool).slice(0,Math.min(15,pool.length));
  quizData=selected.map(w=>{
    const isRev=Math.random()>0.5;
    let opts,correctIdx;
    if(isRev){
      const wrongs=shuffle(all.filter(v=>v.k!==w.k)).slice(0,3).map(v=>v.k);
      opts=shuffle([w.k,...wrongs]);correctIdx=opts.indexOf(w.k);
    }else{
      const wrongs=shuffle(all.filter(v=>v.m!==w.m)).slice(0,3).map(v=>v.m);
      opts=shuffle([w.m,...wrongs]);correctIdx=opts.indexOf(w.m);
    }
    return{q:isRev?w.m:w.k,sub:isRev?"이 뜻의 일본어는?":"이 단어의 뜻은?",opts,ans:correctIdx,vid:w.vid,reading:w.r};
  });
  quizIdx=0;quizScore=0;quizAnswered=false;render();
};
window.answerQuiz=function(i){
  if(quizAnswered)return;quizAnswered=true;
  quizData[quizIdx].sel=i;
  if(i===quizData[quizIdx].ans){
    quizScore++;
    const id=quizData[quizIdx].vid;
    progress[id]=Math.min(5,(getLv(id)||0)+1);
    wrongList=wrongList.filter(x=>x!==id);
  }else{
    const id=quizData[quizIdx].vid;
    if(!wrongList.includes(id))wrongList.push(id);
  }
  addDaily(1);render();
};
window.nextQuiz=function(){quizIdx++;quizAnswered=false;render()};

function renderLevelTabs(){
  return `<div class="level-tabs">${["n5","n4","n3","n2","n1"].map(lv=>
    `<button data-lv="${lv}" class="${currentLv===lv?"active":""}" onclick="setLv('${lv}')">${lv.toUpperCase()}</button>`
  ).join("")}</div>`;
}

function renderNav(){
  const tabs=[["flash","플래시카드"],["list","단어 목록"],["quiz","퀴즈"],["bookmark","즐겨찾기"],["review","틀린 복습"],["stats","통계"]];
  return `<nav>${tabs.map(([id,lb])=>`<button class="${currentTab===id?"active":""}" onclick="setTab('${id}')">${lb}</button>`).join("")}</nav>`;
}

function renderStats(){
  const s=stats();
  return `<div class="stats-bar">
    <div class="stat"><div class="num" style="color:var(--accent2)">${s.n}</div><div class="label">미학습</div></div>
    <div class="stat"><div class="num" style="color:var(--orange)">${s.l}</div><div class="label">학습중</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${s.m}</div><div class="label">완료</div></div>
  </div><div class="progress-bar"><div class="fill" style="width:${s.t?((s.m/s.t*100).toFixed(1)):0}%"></div></div>`;
}

function renderCatFilter(){
  const cats=[["all","전체"],["명사","📦 명사"],["동사","⚡ 동사"],["형용사","🎨 형용사"],["부사","💨 부사"],["문법","📐 문법"]];
  return `<div class="cat-filter">${cats.map(([id,lb])=>`<button class="${filterCat===id?"active":""}" onclick="setCat('${id}')">${lb}</button>`).join("")}</div>`;
}

function renderFlash(){
  if(!studyQueue.length) return `<div class="empty">${currentTab==="review"?"틀린 단어가 없습니다.":currentTab==="bookmark"?"즐겨찾기가 비어있습니다.":"해당하는 단어가 없습니다."}</div>`;
  const w=studyQueue[cardIdx%studyQueue.length];
  const ln=getLvName(w.vid);
  return `<div class="card" onclick="revealCard()">
    <span class="tag">${cardIdx+1}/${studyQueue.length}</span>
    <span class="ptag ${ln}">${getLvLabel(w.vid)}</span>
    <div class="kanji">${w.k}</div>
    <div class="reading">${w.r}</div>
    <div class="cat-badge">${CAT_ICON[w.cat]||""} ${w.cat}</div>
    <div class="meaning ${revealed?"show":""}">${w.m}</div>
    <div class="example ${revealed?"show":""}">${w.ex}</div>
  </div>
  <div class="card-btns">
    <button onclick="speakWord('${w.k}',event)">🔊 발음</button>
    <button class="${isBm(w.vid)?"bookmarked":""}" onclick="toggleBm('${w.vid}',event)">${isBm(w.vid)?"★ 즐겨찾기":"☆ 즐겨찾기"}</button>
  </div>
  ${revealed?"":'<div class="hint">카드를 클릭하면 뜻이 나타납니다</div>'}
  ${revealed?`<div class="card-actions">
    <button class="btn-hard" onclick="rateCard('${w.vid}','hard')">어려움</button>
    <button class="btn-good" onclick="rateCard('${w.vid}','good')">보통</button>
    <button class="btn-easy" onclick="rateCard('${w.vid}','easy')">쉬움</button>
  </div>`:""}`;
}

function renderList(){
  let pool=getVocab().map((v,i)=>({...v,vid:vid(currentLv,i)}));
  if(filterCat!=="all")pool=pool.filter(v=>v.cat===filterCat);
  if(currentTab==="bookmark")pool=pool.filter(v=>isBm(v.vid));
  if(searchQ){const q=searchQ.toLowerCase();pool=pool.filter(v=>v.k.includes(q)||v.r.includes(q)||v.m.includes(q))}
  return `<input class="search" placeholder="검색 (한자, 히라가나, 한국어)" value="${searchQ}" oninput="doSearch(this.value)">
  ${renderCatFilter()}
  <div class="word-list">${pool.length?pool.map(w=>`<div class="word-item" onclick="jumpToCard('${w.vid}')">
    <div class="wi-left"><span class="dot ${getLvName(w.vid)}"></span><span class="wk">${w.k}</span><span class="wr">${w.r}</span></div>
    <div class="wi-right"><span class="wm">${w.m}</span><span class="bm ${isBm(w.vid)?"on":""}" onclick="toggleBm('${w.vid}',event)">${isBm(w.vid)?"★":"☆"}</span>
    <span style="cursor:pointer;font-size:0.85rem" onclick="speakWord('${w.k}',event)">🔊</span></div>
  </div>`).join(""):'<div class="empty">결과가 없습니다.</div>'}</div>`;
}

function renderQuiz(){
  if(!quizData){
    return `<div style="text-align:center;padding:30px 0">
      <p style="color:var(--sub);margin-bottom:14px">${LV_LABEL[currentLv]} 어휘 퀴즈</p>
      <button class="btn-main" onclick="startQuiz('level')">퀴즈 시작</button>
      ${wrongList.length?`<button class="btn-sec" onclick="startQuiz('wrong')">틀린 문제 복습 (${wrongList.length}개)</button>`:""}
    </div>`;
  }
  if(quizIdx>=quizData.length){
    return `<div class="quiz-score"><div class="big">${quizScore}/${quizData.length}</div>
      <p>${quizScore>=quizData.length*0.8?"훌륭합니다!":quizScore>=quizData.length*0.5?"잘했습니다!":"더 연습해보세요!"}</p>
    </div>
    <button class="btn-main" onclick="startQuiz('level')">다시 도전</button>
    <button class="btn-sec" onclick="quizData=null;render()">돌아가기</button>`;
  }
  const q=quizData[quizIdx];
  return `<div class="hint">${quizIdx+1}/${quizData.length} · 정답 ${quizScore}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-sub">${q.sub}</div>
    <div style="text-align:center;margin-bottom:12px"><span style="cursor:pointer;font-size:1.2rem" onclick="speakWord('${q.q}',event)">🔊</span></div>
    ${q.opts.map((o,i)=>`<button class="quiz-option ${quizAnswered?(i===q.ans?"correct":(i===q.sel?"wrong":"")):"" }" onclick="answerQuiz(${i})" ${quizAnswered?"disabled":""}>${o}</button>`).join("")}
    ${quizAnswered?`<button class="btn-main" onclick="nextQuiz()">다음</button>`:""}`;
}

function renderStatsPage(){
  const allLevels=["n5","n4","n3","n2","n1"];
  let totalWords=0,totalMastered=0,totalLearning=0;
  allLevels.forEach(lv=>{
    DATA[lv].forEach((_,i)=>{
      totalWords++;const l=getLv(vid(lv,i));
      if(l>=3)totalMastered++;else if(l>0)totalLearning++;
    });
  });

  const days=[];const d=new Date();
  for(let i=6;i>=0;i--){const dt=new Date(d);dt.setDate(dt.getDate()-i);days.push(dt.toISOString().slice(0,10))}
  const maxVal=Math.max(1,...days.map(d=>dailyStats[d]||0));

  let html=`<div class="stat-grid">
    <div class="stat-card"><div class="sv" style="color:var(--accent2)">${totalWords}</div><div class="sl">전체 단어</div></div>
    <div class="stat-card"><div class="sv" style="color:var(--green)">${totalMastered}</div><div class="sl">완료</div></div>
    <div class="stat-card"><div class="sv" style="color:var(--orange)">${totalLearning}</div><div class="sl">학습중</div></div>
    <div class="stat-card"><div class="sv" style="color:var(--red)">${wrongList.length}</div><div class="sl">틀린 단어</div></div>
  </div>`;

  html+=`<div class="chart-wrap"><h3>최근 7일 학습량</h3><canvas id="chart" width="460" height="160"></canvas></div>`;

  html+=`<div class="chart-wrap"><h3>레벨별 진도</h3>`;
  allLevels.forEach(lv=>{
    const total=DATA[lv].length;let m=0;
    DATA[lv].forEach((_,i)=>{if(getLv(vid(lv,i))>=3)m++});
    const pct=total?(m/total*100).toFixed(0):0;
    html+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:3px"><span style="color:${LV_COLOR[lv]};font-weight:600">${lv.toUpperCase()}</span><span style="color:var(--sub)">${m}/${total} (${pct}%)</span></div>
    <div class="progress-bar"><div class="fill" style="width:${pct}%;background:${LV_COLOR[lv]}"></div></div></div>`;
  });
  html+=`</div>`;

  html+=`<button class="btn-sec" onclick="if(confirm('모든 학습 데이터를 초기화하시겠습니까?')){progress={};bookmarks={};wrongList=[];dailyStats={};save();render()}">데이터 초기화</button>`;

  return html;
}

function render(){
  let html=renderLevelTabs()+renderNav()+renderStats();
  if(currentTab==="stats"){html+=renderStatsPage()}
  else if(currentTab==="list"||currentTab==="bookmark"){html+=renderList()}
  else if(currentTab==="quiz"){html+=renderQuiz()}
  else{html+=renderCatFilter()+renderFlash()}
  app.innerHTML=html;

  if(currentTab==="stats"){
    setTimeout(()=>{
      const c=document.getElementById("chart");
      if(!c)return;
      const ctx=c.getContext("2d");
      const W=c.width=c.offsetWidth*2;const H=c.height=320;
      ctx.scale(1,1);ctx.clearRect(0,0,W,H);
      const days=[];const d=new Date();
      for(let i=6;i>=0;i--){const dt=new Date(d);dt.setDate(dt.getDate()-i);days.push(dt.toISOString().slice(0,10))}
      const vals=days.map(d=>dailyStats[d]||0);
      const maxV=Math.max(1,...vals);
      const barW=W/7*0.5;const gap=(W-barW*7)/8;
      const topPad=30;const botPad=40;const chartH=H-topPad-botPad;
      ctx.fillStyle=getComputedStyle(document.body).getPropertyValue("--sub");
      ctx.font="20px system-ui";ctx.textAlign="center";
      vals.forEach((v,i)=>{
        const x=gap+(gap+barW)*i;
        const h=maxV?(v/maxV)*chartH:0;
        const y=topPad+chartH-h;
        const grad=ctx.createLinearGradient(x,y,x,topPad+chartH);
        grad.addColorStop(0,"#6366f1");grad.addColorStop(1,"#22c55e");
        ctx.fillStyle=grad;
        ctx.beginPath();ctx.roundRect(x,y,barW,h,4);ctx.fill();
        ctx.fillStyle=getComputedStyle(document.body).getPropertyValue("--sub");
        ctx.fillText(days[i].slice(5),x+barW/2,H-10);
        if(v>0)ctx.fillText(v,x+barW/2,y-8);
      });
    },50);
  }
}

buildQueue();render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N2 코어 어휘 100</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--text:#f1f5f9;--sub:#94a3b8;--orange:#f59e0b}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;padding:20px;text-align:center;background:linear-gradient(135deg,#312e81,#4338ca);border-bottom:2px solid var(--accent)}
header h1{font-size:1.6rem;font-weight:700;letter-spacing:-0.5px}
header p{color:var(--sub);font-size:0.85rem;margin-top:4px}
.container{max-width:500px;width:100%;padding:16px;flex:1}
nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
nav button{padding:8px 14px;border:none;border-radius:8px;background:var(--card);color:var(--sub);font-size:0.82rem;cursor:pointer;transition:all .2s}
nav button.active{background:var(--accent);color:#fff}
nav button:hover{background:var(--card2)}
.stats-bar{display:flex;gap:8px;margin-bottom:16px}
.stat{flex:1;background:var(--card);border-radius:10px;padding:10px;text-align:center}
.stat .num{font-size:1.3rem;font-weight:700}
.stat .label{font-size:0.7rem;color:var(--sub);margin-top:2px}
.card{background:var(--card);border-radius:16px;padding:28px 24px;text-align:center;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;cursor:pointer;user-select:none;transition:transform .3s,box-shadow .3s}
.card:hover{box-shadow:0 8px 30px rgba(99,102,241,0.15)}
.card .kanji{font-size:3rem;font-weight:700;margin-bottom:8px}
.card .reading{font-size:1.1rem;color:var(--accent2);margin-bottom:6px}
.card .meaning{font-size:1rem;color:var(--sub);margin-bottom:10px;opacity:0;transition:opacity .3s}
.card .meaning.show{opacity:1}
.card .example{font-size:0.85rem;color:var(--sub);opacity:0;transition:opacity .3s;line-height:1.5;max-width:360px}
.card .example.show{opacity:0.8}
.card .tag{position:absolute;top:12px;right:14px;font-size:0.65rem;padding:3px 8px;border-radius:20px;background:var(--card2);color:var(--sub)}
.card .progress-tag{position:absolute;top:12px;left:14px;font-size:0.65rem;padding:3px 8px;border-radius:20px}
.card .progress-tag.new{background:#312e81;color:var(--accent2)}
.card .progress-tag.learning{background:#422006;color:var(--orange)}
.card .progress-tag.mastered{background:#052e16;color:var(--green)}
.hint{text-align:center;color:var(--sub);font-size:0.75rem;margin:10px 0}
.actions{display:flex;gap:8px;margin-top:14px}
.actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-hard{background:rgba(239,68,68,0.15);color:var(--red)}
.btn-good{background:rgba(99,102,241,0.15);color:var(--accent2)}
.btn-easy{background:rgba(34,197,94,0.15);color:var(--green)}
.actions button:hover{transform:translateY(-1px)}
.word-list{display:flex;flex-direction:column;gap:6px}
.word-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border-radius:10px;cursor:pointer;transition:background .2s}
.word-item:hover{background:var(--card2)}
.word-item .left{display:flex;align-items:center;gap:12px}
.word-item .kanji{font-size:1.1rem;font-weight:600;min-width:60px}
.word-item .reading{font-size:0.8rem;color:var(--accent2)}
.word-item .meaning{font-size:0.8rem;color:var(--sub)}
.word-item .dot{width:8px;height:8px;border-radius:50%}
.dot.new{background:var(--accent2)}
.dot.learning{background:var(--orange)}
.dot.mastered{background:var(--green)}
.search{width:100%;padding:10px 14px;border:1px solid var(--card2);border-radius:10px;background:var(--card);color:var(--text);font-size:0.9rem;margin-bottom:12px;outline:none}
.search:focus{border-color:var(--accent)}
.quiz-option{width:100%;padding:14px;background:var(--card);border:2px solid transparent;border-radius:10px;color:var(--text);font-size:0.9rem;cursor:pointer;text-align:left;margin-bottom:8px;transition:all .2s}
.quiz-option:hover{border-color:var(--accent);background:var(--card2)}
.quiz-option.correct{border-color:var(--green);background:rgba(34,197,94,0.1)}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,0.1)}
.quiz-question{font-size:2.2rem;font-weight:700;text-align:center;margin:30px 0 24px}
.quiz-sub{text-align:center;color:var(--sub);font-size:0.85rem;margin-bottom:20px}
.quiz-score{text-align:center;margin:40px 0}
.quiz-score .big{font-size:3rem;font-weight:700;color:var(--accent2)}
.quiz-score p{color:var(--sub);margin-top:8px}
.quiz-restart{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:20px}
.category-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.category-filter button{padding:5px 10px;border:1px solid var(--card2);border-radius:20px;background:transparent;color:var(--sub);font-size:0.72rem;cursor:pointer;transition:all .2s}
.category-filter button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.progress-bar{width:100%;height:4px;background:var(--card2);border-radius:2px;margin:10px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s}
.empty{text-align:center;padding:40px;color:var(--sub)}
@media(max-width:400px){.card .kanji{font-size:2.4rem} nav button{font-size:0.75rem;padding:6px 10px}}
</style>
</head>

const LS_KEY = "jlpt_n2_progress";
let progress = JSON.parse(localStorage.getItem(LS_KEY)||"{}");
function saveProgress(){localStorage.setItem(LS_KEY, JSON.stringify(progress))}
function getLevel(id){return progress[id]||0}
function getLevelName(id){const l=getLevel(id);return l===0?"new":l<3?"learning":"mastered"}
function getLevelLabel(id){const n=getLevelName(id);return{new:"NEW",learning:"학습중",mastered:"완료"}[n]}

const app=document.getElementById("app");
let currentTab="flash";
let cardIndex=0;
let revealed=false;
let quizData=null;
let quizIndex=0;
let quizScore=0;
let quizAnswered=false;
let filterCat="all";
let searchQuery="";
let studyQueue=[];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function buildQueue(){
  let pool=VOCAB.map((v,i)=>({...v,id:i}));
  if(filterCat!=="all") pool=pool.filter(v=>v.cat===filterCat);
  const newW=pool.filter(v=>getLevel(v.id)===0);
  const learning=pool.filter(v=>{const l=getLevel(v.id);return l>0&&l<3});
  const mastered=pool.filter(v=>getLevel(v.id)>=3);
  studyQueue=[...shuffle(newW),...shuffle(learning),...shuffle(mastered)];
  cardIndex=0;
  revealed=false;
}

function stats(){
  let n=0,l=0,m=0;
  VOCAB.forEach((_,i)=>{const lv=getLevel(i);if(lv===0)n++;else if(lv<3)l++;else m++});
  return{n,l,m}
}

  return `<nav>${tabs.map(([id,label])=>`<button class="${currentTab===id?"active":""}" onclick="switchTab('${id}')">${label}</button>`).join("")}</nav>`;
}

  const s=stats();
  return `<div class="stats-bar">
    <div class="stat"><div class="num" style="color:var(--accent2)">${s.n}</div><div class="label">미학습</div></div>
    <div class="stat"><div class="num" style="color:var(--orange)">${s.l}</div><div class="label">학습중</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${s.m}</div><div class="label">완료</div></div>
  </div>
  <div class="progress-bar"><div class="fill" style="width:${(s.m/VOCAB.length*100).toFixed(1)}%"></div></div>`;
}

function renderFlash(){
  if(!studyQueue.length){buildQueue()}
  if(!studyQueue.length) return `<div class="empty">필터에 해당하는 단어가 없습니다.</div>`;
  const w=studyQueue[cardIndex%studyQueue.length];
  const ln=getLevelName(w.id);
  return `<div class="card" onclick="revealCard()">
    <span class="tag">${cardIndex+1} / ${studyQueue.length}</span>
    <span class="progress-tag ${ln}">${getLevelLabel(w.id)}</span>
    <div class="kanji">${w.k}</div>
    <div class="reading">${w.r}</div>
    <div class="meaning ${revealed?"show":""}">${w.m}</div>
    <div class="example ${revealed?"show":""}">${w.ex}</div>
  </div>
  ${revealed?"":'<div class="hint">카드를 클릭하면 뜻이 나타납니다</div>'}
  ${revealed?`<div class="actions">
    <button class="btn-hard" onclick="rateCard(${w.id},'hard')">어려움</button>
    <button class="btn-good" onclick="rateCard(${w.id},'good')">보통</button>
    <button class="btn-easy" onclick="rateCard(${w.id},'easy')">쉬움</button>
  </div>`:""}`;
}

function renderCatFilter(){
  const cats=[["all","전체"],["명사","명사"],["형용사","형용사"],["동사","동사"],["부사","부사"],["문법","문법"]];
  return `<div class="category-filter">${cats.map(([id,label])=>`<button class="${filterCat===id?"active":""}" onclick="setCat('${id}')">${label}</button>`).join("")}</div>`;
}

function renderList(){
  let pool=VOCAB.map((v,i)=>({...v,id:i}));
  if(filterCat!=="all") pool=pool.filter(v=>v.cat===filterCat);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    pool=pool.filter(v=>v.k.includes(q)||v.r.includes(q)||v.m.includes(q));
  }
  return `<input class="search" placeholder="검색 (한자, 히라가나, 한국어)" value="${searchQuery}" oninput="doSearch(this.value)">
  ${renderCatFilter()}
  <div class="word-list">${pool.map(w=>`<div class="word-item" onclick="jumpToCard(${w.id})">
    <div class="left"><span class="dot ${getLevelName(w.id)}"></span><span class="kanji">${w.k}</span><span class="reading">${w.r}</span></div>
    <span class="meaning">${w.m}</span>
  </div>`).join("")}</div>`;
}

function renderQuiz(){
  if(!quizData){
    return `<div style="text-align:center;padding:40px 0">
      <p style="margin-bottom:16px;color:var(--sub)">JLPT N2 어휘 퀴즈</p>
      <button class="quiz-restart" onclick="startQuiz()">퀴즈 시작 (10문제)</button>
    </div>`;
  }
  if(quizIndex>=quizData.length){
    return `<div class="quiz-score">
      <div class="big">${quizScore} / ${quizData.length}</div>
      <p>${quizScore>=8?"훌륭합니다!":quizScore>=5?"잘했습니다!":"더 연습해보세요!"}</p>
    </div>
    <button class="quiz-restart" onclick="startQuiz()">다시 도전</button>
    <button class="quiz-restart" style="background:var(--card);margin-top:8px" onclick="quizData=null;render()">돌아가기</button>`;
  }
  const q=quizData[quizIndex];
  return `<div class="hint" style="margin-bottom:0">${quizIndex+1} / ${quizData.length}　정답: ${quizScore}</div>
    <div class="quiz-question">${q.question}</div>
    <div class="quiz-sub">${q.sub}</div>
    ${q.options.map((o,i)=>`<button class="quiz-option ${quizAnswered?(i===q.answer?"correct":(i===q.selected?"wrong":"")):"" }" onclick="answerQuiz(${i})" ${quizAnswered?"disabled":""}>${o}</button>`).join("")}
    ${quizAnswered?`<button class="quiz-restart" style="margin-top:8px" onclick="nextQuiz()">다음</button>`:""}`;
}

function render(){
  let html=renderNav()+renderStats();
  if(currentTab==="flash") html+=renderCatFilter()+renderFlash();
  else if(currentTab==="list") html+=renderList();
  else html+=renderQuiz();
  app.innerHTML=html;
}

window.switchTab=function(t){currentTab=t;if(t==="flash")buildQueue();render()};
window.revealCard=function(){if(!revealed){revealed=true;render()}};
window.rateCard=function(id,r){
  let lv=getLevel(id);
  if(r==="hard") lv=Math.max(0,lv-1);
  else if(r==="good") lv=Math.min(5,lv+1);
  else lv=Math.min(5,lv+2);
  progress[id]=lv;saveProgress();
  cardIndex++;revealed=false;render();
};
window.setCat=function(c){filterCat=c;buildQueue();render()};
window.doSearch=function(v){searchQuery=v;render()};
window.jumpToCard=function(id){
  currentTab="flash";buildQueue();
  const idx=studyQueue.findIndex(w=>w.id===id);
  if(idx>=0)cardIndex=idx;
  revealed=false;render();
};
window.startQuiz=function(){
  const pool=shuffle(VOCAB.map((v,i)=>({...v,id:i}))).slice(0,10);
  quizData=pool.map(w=>{
    const wrong=shuffle(VOCAB.filter(v=>v.m!==w.m)).slice(0,3).map(v=>v.m);
    const opts=shuffle([w.m,...wrong]);
    const isReverse=Math.random()>0.5;
    return{
      question:isReverse?w.m:w.k,
      sub:isReverse?"이 뜻의 일본어는?":"이 단어의 뜻은?",
      options:isReverse?shuffle([w.k,...shuffle(VOCAB.filter(v=>v.k!==w.k)).slice(0,3).map(v=>v.k)]):opts,
      answer:isReverse?[w.k,...shuffle(VOCAB.filter(v=>v.k!==w.k)).slice(0,3).map(v=>v.k)]:opts,
      correctVal:isReverse?w.k:w.m,
      id:w.id
    };
  }).map(q=>{
    const opts=q.options||q.answer;
    return{question:q.question,sub:q.sub,options:opts,answer:opts.indexOf(q.correctVal),id:q.id};
  });
  quizIndex=0;quizScore=0;quizAnswered=false;render();
};
window.answerQuiz=function(i){
  if(quizAnswered)return;
  quizAnswered=true;
  quizData[quizIndex].selected=i;
  if(i===quizData[quizIndex].answer){
    quizScore++;
    const id=quizData[quizIndex].id;
    progress[id]=Math.min(5,(getLevel(id)||0)+1);saveProgress();
  }
  render();
};
window.nextQuiz=function(){quizIndex++;quizAnswered=false;render()};

buildQueue();
render();
</script>
</body>
</html>
